<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<script>const PAGE_KEY = 'subtraction';</script>
<script src="i18n/index.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
  <style>
  /* ── SUBTRACTION INLINE EXPRESSION ── */
  .inline-expr {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }
  .ie-minuend { font-family:'Baloo 2',cursive; font-size:clamp(1.8rem,6vw,2.6rem); color:var(--text); }
  .ie-minus   { font-family:'Baloo 2',cursive; font-size:2rem; color:var(--accent); }
  .ie-sub     { font-family:'Baloo 2',cursive; font-size:clamp(1.8rem,6vw,2.6rem); color:var(--accent); }
  .ie-eq      { font-family:'Baloo 2',cursive; font-size:2rem; color:var(--muted); }
  .ie-q       { font-family:'Baloo 2',cursive; font-size:clamp(1.8rem,6vw,2.6rem); color:var(--primary); }

  .inline-labels {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 20px;
  }
  .il-item {
    font-size: 0.66rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    text-align: center;
  }

  /* ── COLUMN LAYOUT ── */
  .col-wrap { display: flex; justify-content: center; margin-bottom: 10px; }
  .col-grid { display: inline-grid; gap: 0; align-items: end; }

  .col-header-cell {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--muted);
    text-align: center;
    padding-bottom: 6px;
  }

  .dcell {
    width: 3rem; height: 3.4rem;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 800;
    line-height: 1;
  }
  .dcell.minuend-digit { color: var(--text); }
  .dcell.subtra-digit  { color: var(--accent); }
  .dcell.empty         { color: transparent; }

  .sign-cell {
    width: 2.4rem; height: 3.4rem;
    display: flex; align-items: center; justify-content: flex-end;
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    padding-right: 4px;
  }

  .col-underline {
    border-top: 3px solid var(--border);
    border-radius: 2px;
    margin: 3px 0 0;
  }

  @media (max-width: 500px) {
    .settings-grid { grid-template-columns: 1fr; }
  }
  </style>
</head>
<body>

<div class="deco">✏️</div>
<div class="deco">⭐</div>
<div class="deco">🎒</div>
<div class="deco">🍎</div>
<div class="deco">📏</div>

<div class="confetti-container" id="confettiContainer"></div>

<div class="container">
  <h1 data-i18n="h1"></h1>
  <p class="subtitle" data-i18n="subtitle"></p>

  <!-- SETTINGS -->
  <div class="settings-card">
    <div class="settings-title" data-i18n="settings_title"></div>
    <div class="settings-grid">
      <div class="setting-group">
        <label data-i18n="mode_label"></label>
        <div class="mode-toggle">
          <button class="mode-btn active" id="modeNoBorrow" onclick="setMode('noBorrow')" data-i18n="mode_no_borrow"></button>
          <button class="mode-btn" id="modeBorrow" onclick="setMode('borrow')" data-i18n="mode_borrow"></button>
        </div>
      </div>
      <div class="setting-group">
        <label data-i18n="max_label"></label>
        <div class="range-display" id="maxDisplay"></div>
        <input type="range" id="maxRange" min="20" max="999" value="99" step="1"
          oninput="updateRangeDisplay('maxDisplay', 'max_display', this.value)">
      </div>
    </div>
    <button class="apply-btn" onclick="applySettings()" data-i18n="apply_btn"></button>
  </div>

  <!-- PROGRESS -->
  <div class="progress-section" id="progressSection" style="display:none">
    <div class="progress-header">
      <span data-i18n="progress_label"></span>
      <span class="progress-counter" id="progressCounter">0 / 10</span>
    </div>
    <div class="progress-bar-track" id="progressBar"></div>
    <div class="progress-legend">
      <span><span class="legend-dot" style="background:var(--correct)"></span><span data-i18n="progress_correct"></span>: <span id="correctCount">0</span></span>
      <span><span class="legend-dot" style="background:var(--wrong)"></span><span data-i18n="progress_wrong"></span>: <span id="wrongCount">0</span></span>
    </div>
  </div>

  <!-- EXAMPLE AREA -->
  <div id="exampleArea">
    <div class="empty-state">
      <div class="emoji">🧮</div>
      <p data-i18n="empty_state_text"></p>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav-buttons" id="navButtons" style="display:none">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled data-i18n="nav_prev"></button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)" data-i18n="nav_next"></button>
  </div>
</div>

<script>
  const MAX_ATTEMPTS = 5;
  let mode = 'noBorrow';
  let examples = [];
  let currentIndex = 0;
  let results  = [];
  let attempts = [];

  function updateRangeDisplay(elId, key, value) {
    document.getElementById(elId).textContent = t(key, { value: (+value).toLocaleString() });
  }

  document.addEventListener('i18n:ready', () => {
    updateRangeDisplay('maxDisplay', 'max_display', document.getElementById('maxRange').value);
  });

  function setMode(m) {
    mode = m;
    document.getElementById('modeNoBorrow').classList.toggle('active', m === 'noBorrow');
    document.getElementById('modeBorrow').classList.toggle('active', m === 'borrow');
  }

  function randInt(a, b) {
    return Math.floor(Math.random() * (b - a + 1)) + a;
  }

  // Check if subtraction A - B requires borrowing (any digit of B > corresponding digit of A)
  function hasBorrow(a, b) {
    const ah = Math.floor(a / 100), at = Math.floor((a % 100) / 10), au = a % 10;
    const bh = Math.floor(b / 100), bt = Math.floor((b % 100) / 10), bu = b % 10;
    // units borrow
    if (bu > au) return true;
    // after potential borrow from tens
    const auAdj = bu > au ? au + 10 : au;
    const atAdj = bu > au ? at - 1 : at;
    if (bt > atAdj) return true;
    if (bh > ah) return true;
    return false;
  }

  // Has zero in tens digit of the minuend (e.g. 305, 607, 102)
  function hasZeroInTens(n) {
    return n >= 100 && Math.floor((n % 100) / 10) === 0;
  }

  function generateExamples() {
    const maxVal = parseInt(document.getElementById('maxRange').value);
    const arr = [];

    // We need at least 2 examples where minuend has 0 in tens
    // and all examples satisfy borrow/noBorrow constraint
    const needZeroTens = 2;
    let zeroTensCount = 0;
    let tries = 0;

    while (arr.length < 10 && tries < 5000) {
      tries++;
      let a, b;

      if (mode === 'noBorrow') {
        // Generate A, then pick B digit-by-digit so no borrow occurs
        a = randInt(10, maxVal);
        const au = a % 10;
        const at = Math.floor((a % 100) / 10);
        const ah = Math.floor(a / 100);

        const bu = randInt(0, au);
        const bt = randInt(0, at);
        const bh = randInt(0, ah);
        b = bh * 100 + bt * 10 + bu;
        if (b === 0 || b >= a) continue;
        if (hasBorrow(a, b)) continue;
      } else {
        // borrow mode: ensure at least one borrow happens
        a = randInt(10, maxVal);
        b = randInt(1, a - 1);
        if (!hasBorrow(a, b)) continue;
      }

      const diff = a - b;
      if (diff <= 0) continue;

      // Ensure at least needZeroTens examples have 0 in tens of minuend
      // Use slots: first needZeroTens slots are forced, rest are free
      const wantZeroTens = arr.length < needZeroTens && zeroTensCount < needZeroTens;

      if (wantZeroTens) {
        // Force a to have 0 in tens — only possible if maxVal >= 100
        if (maxVal < 100) {
          // Can't do zero-in-tens below 100, just add normally
          arr.push({ a, b, diff });
          zeroTensCount++; // pretend satisfied
          continue;
        }
        if (!hasZeroInTens(a)) continue; // retry
        zeroTensCount++;
      }

      arr.push({ a, b, diff });
    }

    // If we ran out of tries and still need zero-tens examples, patch remaining
    // (should not happen in practice but as safety net)
    return arr.slice(0, 10);
  }

  function applySettings() {
    examples = generateExamples();
    results  = new Array(10).fill(null);
    attempts = new Array(10).fill(0);
    currentIndex = 0;
    document.getElementById('progressSection').style.display = 'block';
    document.getElementById('navButtons').style.display = 'flex';
    renderProgress();
    renderCard();
  }

  function renderProgress() {
    const track = document.getElementById('progressBar');
    track.innerHTML = '';
    let correct = 0, wrong = 0;
    results.forEach(r => {
      const seg = document.createElement('div');
      seg.className = 'progress-segment';
      if (r === 'correct') { seg.classList.add('correct'); correct++; }
      else if (r === 'wrong') { seg.classList.add('wrong'); wrong++; }
      track.appendChild(seg);
    });
    const answered = results.filter(r => r !== null).length;
    document.getElementById('progressCounter').textContent = `${answered} / 10`;
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = wrong;
  }

  function renderCard() {
    const ex     = results[currentIndex] !== null ? examples[currentIndex] : examples[currentIndex];
    const exData = examples[currentIndex];
    const result = results[currentIndex];
    const att    = attempts[currentIndex];
    const locked = result !== null;
    const disabled = locked ? 'disabled' : '';

    const inputClass = result === 'correct' ? 'input-correct' : result === 'wrong' ? 'input-wrong' : '';

    // Badge
    let badge = '';
    if (result === 'correct') badge = `<div class="card-badge correct-badge">✅</div>`;
    else if (result === 'wrong') badge = `<div class="card-badge wrong-badge">❌</div>`;

    // Feedback
    let feedbackText = '', feedbackClass = '';
    if (result === 'correct') {
      feedbackText = t('feedback_correct');
      feedbackClass = 'correct';
    } else if (result === 'wrong') {
      feedbackText = t('feedback_wrong_reveal', { answer: exData.diff });
      feedbackClass = 'wrong';
    } else if (att > 0) {
      const left = MAX_ATTEMPTS - att;
      feedbackText = t('feedback_attempts_left', { left });
      feedbackClass = 'wrong';
    }

    // Borrow badge
    const borrowBadge = mode === 'borrow'
      ? `<div style="text-align:center;margin-bottom:14px"><span class="borrow-badge">${t('borrow_badge')}</span></div>`
      : '';

    // Attempt dots
    let dotsHTML = '';
    if (!locked) {
      dotsHTML = '<div class="attempt-dots">';
      for (let i = 0; i < MAX_ATTEMPTS; i++) {
        dotsHTML += `<span class="attempt-dot ${i < att ? 'used' : ''}"></span>`;
      }
      dotsHTML += '</div>';
    }

    // Answer value shown only when resolved
    const ansVal = locked ? exData.diff : '';

    const area = document.getElementById('exampleArea');
    area.innerHTML = `
      <div class="example-card" id="exampleCard">
        ${badge}
        <div class="example-num">${t('example_counter', { current: currentIndex + 1, total: 10 })}</div>
        ${borrowBadge}

        ${buildVisual(exData)}

        <div class="input-area">
          <div class="input-group">
            <span class="input-label">${t('input_label')}</span>
            <input type="number" class="answer-input ${inputClass}" id="inputAns"
              placeholder="?" value="${ansVal}" ${disabled} min="0">
          </div>
        </div>

        ${dotsHTML}

        <button class="check-btn" id="checkBtn" onclick="checkAnswer()" ${disabled}>
          ${t('check_btn')}
        </button>
        <div class="feedback ${feedbackClass}" id="feedback">${feedbackText}</div>
      </div>`;

    if (!locked) {
      const inp = document.getElementById('inputAns');
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
      inp.focus();
    }
    updateNavBtns();
  }

  // Split number into array of digit strings, padded to `cols` length (left-pad with '')
  function splitDigits(n, cols) {
    const s = String(n);
    const arr = s.split('');
    while (arr.length < cols) arr.unshift('');
    return arr;
  }

  function buildVisual(exData) {
    const cols = exData.a >= 100 ? 3 : 2;
    const LABELS = cols === 3
      ? [t('col_label_hundreds'), t('col_label_tens'), t('col_label_units')]
      : [t('col_label_tens'), t('col_label_units')];

    const aDigits = splitDigits(exData.a, cols);
    const bDigits = splitDigits(exData.b, cols);

    // ── Inline expression ──
    // approximate label widths: minuend width ~ length*1.4rem, gap, subtrahend, gap, =?, gap
    const inlineExpr = `
      <div class="inline-expr">
        <span class="ie-minuend">${exData.a}</span>
        <span class="ie-minus">−</span>
        <span class="ie-sub">${exData.b}</span>
        <span class="ie-eq">=</span>
        <span class="ie-q">?</span>
      </div>
      <div class="inline-labels" style="gap:10px;margin-bottom:22px">
        <span class="il-item" style="min-width:5rem;text-align:center">${t('inline_label_minuend')}</span>
        <span class="il-item" style="min-width:2rem"></span>
        <span class="il-item" style="min-width:4rem;text-align:center">${t('inline_label_subtrahend')}</span>
        <span class="il-item" style="min-width:2rem"></span>
        <span class="il-item" style="min-width:3rem;text-align:center">${t('inline_label_difference')}</span>
      </div>`;

    // ── Column grid ──
    // Grid: [sign col] [digit col] × cols
    // Rows: header, minuend digits, subtrahend digits, underline (via border-top on sign/digits)

    // Header row: empty sign cell + label cells
    let headerCells = `<div class="col-header-cell col-header-sign"></div>`;
    LABELS.forEach(l => {
      headerCells += `<div class="col-header-cell">${l}</div>`;
    });

    // Minuend row: empty sign + digit cells
    let minRow = `<div class="sign-cell empty-sign"></div>`;
    aDigits.forEach(d => {
      minRow += `<div class="dcell minuend-digit">${d}</div>`;
    });

    // Subtrahend row: minus sign + digit cells
    let subRow = `<div class="sign-cell">−</div>`;
    bDigits.forEach(d => {
      subRow += `<div class="dcell subtra-digit">${d}</div>`;
    });

    // Underline: spans all digit columns (not sign col), rendered as border-top on a flex row
    const underline = `
      <div style="display:contents">
        <div></div>
        <div style="grid-column: span ${cols}; border-top: 3px solid var(--border); margin: 2px 0 0; border-radius:2px;"></div>
      </div>`;

    const gridCols = `2.2rem repeat(${cols}, 3rem)`;

    const columnBlock = `
      <div class="col-wrap">
        <div class="col-grid" style="display:inline-grid; grid-template-columns:${gridCols}; align-items:end;">
          ${headerCells}
          ${minRow}
          ${subRow}
          ${underline}
        </div>
      </div>`;

    return inlineExpr + columnBlock;
  }

  function checkAnswer() {
    if (results[currentIndex] !== null) return;
    const exData = examples[currentIndex];
    const inp    = document.getElementById('inputAns');
    const val    = parseInt(inp.value);
    const card   = document.getElementById('exampleCard');

    if (isNaN(val)) { inp.focus(); return; }

    const correct = val === exData.diff;

    if (correct) {
      results[currentIndex] = 'correct';
      renderProgress();
      card.classList.add('glow-correct');
      launchConfetti();
      showEmoji('🎉');
      setTimeout(() => renderCard(), 700);
    } else {
      attempts[currentIndex]++;
      const att = attempts[currentIndex];
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 450);

      if (att >= MAX_ATTEMPTS) {
        results[currentIndex] = 'wrong';
        renderProgress();
        showEmoji('😢');
        setTimeout(() => renderCard(), 700);
      } else {
        const left = MAX_ATTEMPTS - att;
        showEmoji('😟');
        const fb = document.getElementById('feedback');
        fb.textContent = t('feedback_attempts_left', { left });
        fb.className = 'feedback wrong';
        // Update dots
        document.querySelectorAll('.attempt-dot').forEach((d, i) => {
          if (i < att) d.classList.add('used');
        });
        inp.value = '';
        inp.focus();
      }
    }
  }

  function navigate(dir) {
    const next = currentIndex + dir;
    if (next < 0 || next >= examples.length) return;
    currentIndex = next;
    renderCard();
  }

  function updateNavBtns() {
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === examples.length - 1;
  }

  
  const COLORS = ['#f4845f','#6bbf94','#74b3e8','#f9d56e','#c49de8','#f47c7c'];
  function launchConfetti() {
    const c = document.getElementById('confettiContainer');
    for (let i = 0; i < 65; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.top  = '-20px';
      p.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
      p.style.width  = (7 + Math.random() * 9) + 'px';
      p.style.height = (7 + Math.random() * 9) + 'px';
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
      p.style.animationDuration = (1.4 + Math.random() * 2) + 's';
      p.style.animationDelay   = (Math.random() * 0.5) + 's';
      c.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }
  }

  function showEmoji(e) {
    const el = document.createElement('div');
    el.className = 'emoji-burst';
    el.textContent = e;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
</script>
</body>
</html>
