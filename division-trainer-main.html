<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<script>const PAGE_KEY = 'division-main';</script>
<script src="i18n/index.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
  <style>
  /* ── DIVISION VISUAL (inline style) ── */
  .div-visual {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }
  .div-num {
    font-family: 'Baloo 2', cursive;
    font-size: 3.2rem;
    font-weight: 800;
    line-height: 1;
  }
  .div-num.dividend { color: var(--text); }
  .div-num.divisor  { color: var(--primary); }
  .div-sign, .equals-sign {
    font-family: 'Baloo 2', cursive;
    font-size: 2.8rem;
    font-weight: 800;
    color: var(--muted);
    line-height: 1;
  }

  /* ── PASTURE ── */
  .pasture-section {
    background: var(--accent-light);
    border: 2px solid var(--accent);
    border-radius: var(--radius);
    padding: 12px 16px 14px;
    margin-bottom: 16px;
    transition: border-color 0.15s, background 0.15s;
  }
  .pasture-section.drag-over { border-color: var(--correct); background: #b8e4cc; }
  .pasture-label {
    font-size: 0.75rem;
    font-weight: 800;
    color: #2e7a52;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    text-align: center;
  }
  .pasture-chicks {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px;
    min-height: 36px;
  }

  /* ── INSIGHT BLOCK ── */
  .insight-block {
    margin-top: 16px;
    padding: 14px 20px;
    background: var(--blue-light);
    border: 2px solid var(--blue);
    border-radius: var(--radius-sm);
    text-align: center;
  }
  .insight-label {
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .insight-formula {
    font-family: 'Baloo 2', cursive;
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1.7;
  }
  .insight-formula .div-part { color: var(--correct); }
  .insight-formula .mul-part { color: var(--primary); }
  </style>
</head>
<body>

<div class="deco">✏️</div>
<div class="deco">🌟</div>
<div class="deco">🎒</div>
<div class="deco">🍎</div>
<div class="deco">📐</div>

<div class="confetti-container" id="confettiContainer"></div>

<div class="container">
  <h1 data-i18n="h1"></h1>
  <p class="subtitle" data-i18n="subtitle"></p>

  <div class="settings-card">
    <div class="settings-title" data-i18n="settings_title"></div>
    <span class="table-label" data-i18n="table_label"></span>
    <div class="table-buttons">
      <button class="table-btn active" data-val="2"  onclick="selectTable(this)" data-i18n="table_btn_2"></button>
      <button class="table-btn"        data-val="3"  onclick="selectTable(this)" data-i18n="table_btn_3"></button>
      <button class="table-btn"        data-val="4"  onclick="selectTable(this)" data-i18n="table_btn_4"></button>
      <button class="table-btn"        data-val="5"  onclick="selectTable(this)" data-i18n="table_btn_5"></button>
      <button class="table-btn"        data-val="6"  onclick="selectTable(this)" data-i18n="table_btn_6"></button>
      <button class="table-btn"        data-val="7"  onclick="selectTable(this)" data-i18n="table_btn_7"></button>
      <button class="table-btn"        data-val="8"  onclick="selectTable(this)" data-i18n="table_btn_8"></button>
      <button class="table-btn"        data-val="9"  onclick="selectTable(this)" data-i18n="table_btn_9"></button>
      <button class="table-btn"        data-val="10" onclick="selectTable(this)" data-i18n="table_btn_10"></button>
    </div>
    <button class="apply-btn" onclick="applySettings()" data-i18n="apply_btn"></button>
  </div>

  <div class="progress-section" id="progressSection" style="display:none">
    <div class="progress-header">
      <span data-i18n="progress_label"></span>
      <span class="progress-counter" id="progressCounter">0 / 20</span>
    </div>
    <div class="progress-bar-track" id="progressBar"></div>
    <div class="progress-legend">
      <span><span class="legend-dot" style="background:var(--correct)"></span><span data-i18n="progress_correct"></span>: <span id="correctCount">0</span></span>
      <span><span class="legend-dot" style="background:var(--wrong)"></span><span data-i18n="progress_wrong"></span>: <span id="wrongCount">0</span></span>
    </div>
  </div>

  <div id="exampleArea">
    <div class="empty-state">
      <div class="emoji">🧮</div>
      <p data-i18n="empty_state_text"></p>
    </div>
  </div>

  <div class="nav-buttons" id="navButtons" style="display:none">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled data-i18n="nav_prev"></button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)" data-i18n="nav_next"></button>
  </div>
</div>

<script>
  const TOTAL        = 20;
  const MAX_ATTEMPTS = 5;

  let selectedDivisor = 2;
  let examples     = [];
  let currentIndex = 0;
  let results      = []; // null | 'correct' | 'wrong'
  let attempts     = []; // wrong attempt count per example

  
  function selectTable(btn) {
    document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDivisor = parseInt(btn.dataset.val);
  }

  /* ── GENERATE ──
     divisor  = selectedDivisor (fixed, shown as divisor)
     quotient = 1–10  →  dividend = quotient × divisor
     Duplicate pool (2×10 = 20), shuffle
  */
  function generateExamples() {
    const d = selectedDivisor;
    const pool = [];
    for (let pass = 0; pass < 2; pass++)
      for (let q = 1; q <= 10; q++)
        pool.push({ quotient: q, divisor: d, dividend: q * d });
    // Fisher-Yates
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, TOTAL);
  }

  function applySettings() {
    examples     = generateExamples();
    results      = new Array(TOTAL).fill(null);
    attempts     = new Array(TOTAL).fill(0);
    currentIndex = 0;
    document.getElementById('progressSection').style.display = 'block';
    document.getElementById('navButtons').style.display      = 'flex';
    renderProgress();
    renderCard();
  }

  
  function renderProgress() {
    const track = document.getElementById('progressBar');
    track.innerHTML = '';
    let correct = 0, wrong = 0;
    results.forEach(r => {
      const seg = document.createElement('div');
      seg.className = 'progress-segment';
      if (r === 'correct') { seg.classList.add('correct'); correct++; }
      else if (r === 'wrong') { seg.classList.add('wrong'); wrong++; }
      track.appendChild(seg);
    });
    const answered = results.filter(r => r !== null).length;
    document.getElementById('progressCounter').textContent = `${answered} / ${TOTAL}`;
    document.getElementById('correctCount').textContent    = correct;
    document.getElementById('wrongCount').textContent      = wrong;
  }

  /* ── ATTEMPT PIPS ── */
  function buildAttemptPips(idx, resultVal) {
    const used = attempts[idx];
    let html = '';
    for (let i = 0; i < MAX_ATTEMPTS; i++) {
      let cls = 'attempt-pip';
      if (resultVal === 'correct' && i === 0) cls += ' correct';
      else if (i < used) cls += ' used';
      html += `<div class="${cls}"></div>`;
    }
    return `<div class="attempts-row">${t('attempts_label')}: <div class="attempt-pips">${html}</div></div>`;
  }

  /* ── STATIC BASKETS (after answer) ── */
  function buildStaticBaskets(ex) {
    const { divisor, quotient, dividend } = ex;
    if (dividend > 100) return '';
    const bWord = divisor === 1 ? t('basket_label_one', { count: divisor }) : divisor < 5 ? t('basket_label_few', { count: divisor }) : t('basket_label_many', { count: divisor });
    let html = `<div class="basket-section">
      <div class="basket-label">${bWord}</div>
      <div class="basket-groups">`;
    for (let g = 0; g < divisor; g++) {
      html += `<div class="basket-group"><span class="basket-group-num">${g + 1}</span>`;
      for (let c = 0; c < quotient; c++) {
        const delay = (g * quotient + c) * 50;
        html += `<span class="chick static" style="animation-delay:${delay}ms">🐣</span>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
    return html;
  }

  /* ── DRAG & DROP ZONES (before answer) ── */
  function buildDragZones(ex) {
    const { divisor, dividend } = ex;
    if (dividend > 100) return '';
    const bWord = divisor === 1 ? t('basket_label_one', { count: divisor }) : divisor < 5 ? t('basket_label_few', { count: divisor }) : t('basket_label_many', { count: divisor });

    let chickHTML = '';
    for (let i = 0; i < dividend; i++)
      chickHTML += `<span class="chick" draggable="true" data-id="${i}">🐣</span>`;

    let basketHTML = '';
    for (let g = 0; g < divisor; g++)
      basketHTML += `<div class="basket-group drop-target" data-basket="${g}">
        <span class="basket-group-num">${g + 1}</span>
      </div>`;

    return `
      <div class="pasture-section drop-target" id="pastureZone">
        <div class="pasture-label">${t('pasture_label', { count: dividend })}</div>
        <div class="pasture-chicks" id="pastureChicks">${chickHTML}</div>
      </div>
      <div class="basket-section">
        <div class="basket-label">${bWord}</div>
        <div class="basket-groups" id="basketGroups">${basketHTML}</div>
      </div>`;
  }

  /* ── DRAG & DROP LOGIC ── */
  function initDragDrop(ex) {
    if (ex.dividend > 100) return;

    let draggedChick = null;
    const card = document.getElementById('exampleCard');

    // Delegate dragstart to the card — works for chicks anywhere (pasture or baskets)
    card.addEventListener('dragstart', e => {
      const chick = e.target.closest('.chick');
      if (!chick) return;
      draggedChick = chick;
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => draggedChick && draggedChick.classList.add('dragging'));
    });

    card.addEventListener('dragend', () => {
      if (draggedChick) draggedChick.classList.remove('dragging');
      draggedChick = null;
      card.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    });

    // Helper: register any element as a drop zone
    function makeDropZone(el, getContainer) {
      el.addEventListener('dragover',  e => { e.preventDefault(); el.classList.add('drag-over'); });
      el.addEventListener('dragleave', e => {
        // Only remove if leaving to outside this element
        if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over');
      });
      el.addEventListener('drop', e => {
        e.preventDefault();
        el.classList.remove('drag-over');
        if (!draggedChick) return;
        const container = getContainer(el);
        if (container && !container.contains(draggedChick)) {
          container.appendChild(draggedChick);
        }
        draggedChick.classList.remove('dragging');
        draggedChick = null;
      });
    }

    // Pasture zone → drop into #pastureChicks
    const pastureZone = document.getElementById('pastureZone');
    if (pastureZone) makeDropZone(pastureZone, () => document.getElementById('pastureChicks'));

    // Each basket → drop directly into the basket-group element
    const basketGroups = document.getElementById('basketGroups');
    if (basketGroups) {
      basketGroups.querySelectorAll('.basket-group').forEach(b => makeDropZone(b, el => el));
    }
  }

  /* ── RENDER CARD ── */
  function renderCard() {
    const ex     = examples[currentIndex];
    const result = results[currentIndex];
    const att    = attempts[currentIndex];
    const done   = result !== null;

    const disabled   = done ? 'disabled' : '';
    const inputClass = result === 'correct' ? 'input-correct' : (done ? 'input-wrong' : '');

    let badge = '';
    if (result === 'correct') badge = `<div class="card-badge correct-badge">✅</div>`;
    else if (result === 'wrong') badge = `<div class="card-badge wrong-badge">❌</div>`;

    let feedbackText = '', feedbackClass = '';
    if (result === 'correct') {
      feedbackText = t('feedback_correct');
      feedbackClass = 'correct';
    } else if (result === 'wrong') {
      feedbackText = t('feedback_wrong_reveal', { answer: ex.quotient });
      feedbackClass = 'wrong';
    } else if (att > 0) {
      feedbackText = t('feedback_attempts_left', { left: MAX_ATTEMPTS - att });
      feedbackClass = 'wrong';
    }

    const insightHTML = done ? `
      <div class="insight-block">
        <div class="insight-label">${t('insight_label')}</div>
        <div class="insight-formula">
          <span class="div-part">${t('insight_division', { dividend: ex.dividend, divisor: ex.divisor, quotient: ex.quotient })}</span><br>
          <span class="mul-part">${t('insight_multiplication', { quotient: ex.quotient, divisor: ex.divisor, dividend: ex.dividend })}</span>
        </div>
      </div>` : '';

    const visualHTML = done ? buildStaticBaskets(ex) : buildDragZones(ex);

    document.getElementById('exampleArea').innerHTML = `
      <div class="example-card" id="exampleCard">
        ${badge}
        <div class="example-num">${t('example_counter', { current: currentIndex + 1, total: TOTAL })}</div>

        <div class="div-visual">
          <div class="div-num dividend">${ex.dividend}</div>
          <div class="div-sign">÷</div>
          <div class="div-num divisor">${ex.divisor}</div>
          <div class="equals-sign">=</div>
        </div>

        ${visualHTML}
        ${buildAttemptPips(currentIndex, result)}

        <div class="input-area">
          <div class="input-group">
            <span class="input-label">${t('input_label')}</span>
            <input type="number" class="answer-input ${inputClass}" id="inputAns"
              placeholder="?" value="${done ? ex.quotient : ''}" ${disabled} min="0" max="999">
          </div>
        </div>

        <button class="check-btn" onclick="checkAnswer()" ${disabled}>${t('check_btn')}</button>

        <div class="feedback ${feedbackClass}">${feedbackText}</div>
        ${insightHTML}
      </div>`;

    if (!done) {
      const inp = document.getElementById('inputAns');
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
      inp.focus();
      initDragDrop(ex);
    }

    updateNavBtns();
  }

  /* ── CHECK ANSWER ── */
  function checkAnswer() {
    const ex  = examples[currentIndex];
    const idx = currentIndex;
    if (results[idx] !== null) return;

    const inp = document.getElementById('inputAns');
    const val = parseInt(inp.value);
    if (isNaN(val) || inp.value === '') { inp.focus(); return; }

    const card = document.getElementById('exampleCard');

    if (val === ex.quotient) {
      results[idx] = 'correct';
      renderProgress();
      card.classList.add('glow-correct');
      launchConfetti();
      showEmoji('🎉');
      setTimeout(() => renderCard(), 700);
    } else {
      attempts[idx]++;
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 450);

      if (attempts[idx] >= MAX_ATTEMPTS) {
        results[idx] = 'wrong';
        renderProgress();
        showEmoji('😢');
        setTimeout(() => renderCard(), 700);
      } else {
        showEmoji('😟');
        const fb = document.querySelector('.feedback');
        if (fb) { fb.className = 'feedback wrong'; fb.textContent = t('feedback_attempts_left', { left: MAX_ATTEMPTS - attempts[idx] }); }
        const pipsRow = document.querySelector('.attempts-row');
        if (pipsRow) pipsRow.outerHTML = buildAttemptPips(idx, null);
        inp.value = '';
        inp.classList.add('input-wrong');
        setTimeout(() => { inp.classList.remove('input-wrong'); inp.focus(); }, 500);
      }
    }
  }

  /* ── NAVIGATION ── */
  function navigate(dir) {
    const next = currentIndex + dir;
    if (next < 0 || next >= examples.length) return;
    currentIndex = next;
    renderCard();
  }

  function updateNavBtns() {
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === examples.length - 1;
  }

  /* ── CONFETTI & EMOJI ── */
  const CONFETTI_COLORS = ['#f4845f','#6bbf94','#74b3e8','#f9d56e','#c49de8','#f47c7c'];

  function launchConfetti() {
    const c = document.getElementById('confettiContainer');
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left             = Math.random() * 100 + 'vw';
      p.style.top              = '-20px';
      p.style.background       = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      p.style.width            = (8 + Math.random() * 8) + 'px';
      p.style.height           = (8 + Math.random() * 8) + 'px';
      p.style.borderRadius     = Math.random() > 0.5 ? '50%' : '2px';
      p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      p.style.animationDelay   = (Math.random() * 0.5) + 's';
      c.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }
  }

  function showEmoji(emoji) {
    const el = document.createElement('div');
    el.className   = 'emoji-burst';
    el.textContent = emoji;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
</script>
</body>
</html>
