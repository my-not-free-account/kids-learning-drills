<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<script>const PAGE_KEY = 'division-col';</script>
<script src="i18n/index.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ee;
    --card: #fff9f2;
    --primary: #f4845f;
    --primary-light: #fdddd3;
    --accent: #6bbf94;
    --accent-light: #d4f0e3;
    --blue: #74b3e8;
    --blue-light: #d8edfc;
    --yellow: #f9d56e;
    --yellow-light: #fef6d6;
    --purple: #c49de8;
    --purple-light: #eedeff;
    --text: #3d3642;
    --muted: #a09aab;
    --border: #ecdfd4;
    --correct: #6bbf94;
    --wrong: #f47c7c;
    --radius: 20px;
    --radius-sm: 12px;
    --shadow: 0 4px 24px rgba(100,60,30,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
    background-image:
      radial-gradient(circle at 10% 10%, #fde6da55 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #d4f0e355 0%, transparent 40%),
      radial-gradient(circle at 60% 20%, #d8edfc44 0%, transparent 30%);
  }

  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    color: var(--primary);
    text-align: center;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 28px;
  }

  
  .deco {
    position: fixed;
    pointer-events: none;
    user-select: none;
    font-size: 2.4rem;
    opacity: 0.18;
    animation: float 6s ease-in-out infinite;
  }
  .deco:nth-child(1) { top: 5%; left: 3%; animation-delay: 0s; }
  .deco:nth-child(2) { top: 12%; right: 5%; animation-delay: 1s; font-size: 2rem; }
  .deco:nth-child(3) { bottom: 8%; left: 6%; animation-delay: 2s; font-size: 1.8rem; }
  .deco:nth-child(4) { bottom: 15%; right: 4%; animation-delay: 3s; }
  .deco:nth-child(5) { top: 50%; left: 1%; animation-delay: 1.5s; font-size: 1.6rem; }
  @keyframes float {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }

  
  .container {
    max-width: 700px;
    margin: 0 auto;
  }

  
  .settings-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 28px;
    margin-bottom: 28px;
  }

  .settings-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 500px) {
    .settings-grid { grid-template-columns: 1fr; }
  }

  .setting-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    gap: 8px;
  }

  .mode-btn {
    flex: 1;
    padding: 10px 8px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
  }

  .mode-btn.active {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
  }

  /* Range sliders */
  .range-wrap {
    position: relative;
  }

  .range-display {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 6px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 4px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--primary);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(244,132,95,0.35);
    transition: transform 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }

  /* Apply button */
  .apply-btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--primary) 0%, #e8683e 100%);
    color: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(244,132,95,0.35);
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }

  .apply-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(244,132,95,0.45);
  }

  .apply-btn:active { transform: translateY(0); }

  
  .progress-section {
    margin-bottom: 20px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
  }

  .progress-counter {
    font-family: 'Baloo 2', cursive;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }

  .progress-bar-track {
    height: 14px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    display: flex;
    gap: 2px;
  }

  .progress-segment {
    flex: 1;
    background: #ecdfd4;
    border-radius: 99px;
    transition: background 0.4s ease;
  }

  .progress-segment.correct { background: var(--correct); }
  .progress-segment.wrong { background: var(--wrong); }

  .progress-legend {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
  }

  .legend-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 4px;
  }

  
  .example-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px 28px 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.3s;
  }

  .example-card.shake {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .example-card.glow-correct {
    box-shadow: 0 0 0 3px var(--correct), var(--shadow);
  }

  .example-card.glow-wrong {
    box-shadow: 0 0 0 3px var(--wrong), var(--shadow);
  }

  .example-num {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }

  
  .division-visual {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    margin-bottom: 28px;
  }

  .division-labeled {
    display: flex;
    align-items: flex-end;
    gap: 4px;
  }

  .dl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .dl-number {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 800;
    line-height: 1;
  }

  .dl-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }

  .dividend-num { color: var(--text); }
  .divisor-num  { color: var(--primary); }
  .answer-num   { color: var(--blue); }

  .div-sign {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 800;
    color: var(--muted);
    padding: 0 6px;
    padding-bottom: 24px;
    line-height: 1;
  }

  
  .attempt-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .attempt-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.25s ease, transform 0.2s;
  }

  .attempt-dot.used {
    background: var(--wrong);
    transform: scale(1.15);
  }

  
  .input-area {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .input-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .answer-input {
    width: 100px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 2.5px solid var(--border);
    background: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  .answer-input::-webkit-inner-spin-button,
  .answer-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .answer-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-light);
  }

  .answer-input.input-correct {
    border-color: var(--correct);
    background: var(--accent-light);
  }

  .answer-input.input-wrong {
    border-color: var(--wrong);
    background: #fde8e8;
  }

  
  .check-btn {
    display: block;
    width: 100%;
    max-width: 280px;
    margin: 0 auto;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, #4aaa7a 100%);
    color: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(107,191,148,0.35);
    transition: all 0.2s ease;
  }

  .check-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(107,191,148,0.45);
  }

  .check-btn:active { transform: translateY(0); }
  .check-btn:disabled {
    opacity: 0.6;
    cursor: default;
    transform: none;
  }

  
  .feedback {
    text-align: center;
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    font-weight: 800;
    min-height: 48px;
    margin-top: 16px;
    transition: all 0.3s ease;
  }

  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }

  
  .nav-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .nav-btn {
    flex: 1;
    max-width: 180px;
    padding: 13px 20px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--blue);
    background: var(--blue-light);
    color: var(--blue);
    transform: translateY(-2px);
  }

  .nav-btn:disabled {
    opacity: 0.4;
    cursor: default;
    transform: none;
  }

  
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1000;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  
  .emoji-burst {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 5rem;
    pointer-events: none;
    z-index: 1001;
    animation: emojiBurst 1.2s ease forwards;
  }

  @keyframes emojiBurst {
    0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -60%) scale(0.8); opacity: 0; }
  }

  
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 1rem; font-weight: 600; }

  
  .card-badge {
    position: absolute;
    top: 20px; right: 20px;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
  }

  .card-badge.correct-badge { background: var(--accent-light); }
  .card-badge.wrong-badge { background: #fde8e8; }
</style>
</head>
<body>

<!-- Decorative floating elements -->
<div class="deco">✏️</div>
<div class="deco">🌟</div>
<div class="deco">🎒</div>
<div class="deco">🍎</div>
<div class="deco">📐</div>

<div class="confetti-container" id="confettiContainer"></div>

<div class="container">
  <h1 data-i18n="h1"></h1>
  <p class="subtitle" data-i18n="subtitle"></p>

  <!-- SETTINGS -->
  <div class="settings-card">
    <div class="settings-title" data-i18n="settings_title"></div>
    <div class="settings-grid">
      <div class="setting-group">
        <label data-i18n="mode_label"></label>
        <div class="mode-toggle">
          <button class="mode-btn active" id="modeNoRemainder" onclick="setMode('noRemainder')" data-i18n="mode_no_remainder"></button>
          <button class="mode-btn" id="modeRemainder" onclick="setMode('remainder')" data-i18n="mode_remainder"></button>
        </div>
      </div>

      <div class="setting-group">
        <label data-i18n="divisor_label"></label>
        <div class="range-display" id="divisorDisplay"></div>
        <div class="range-wrap">
          <input type="range" id="divisorRange" min="2" max="100" value="9"
            oninput="updateRangeDisplay('divisorDisplay', 'divisor_display', this.value)">
        </div>
      </div>

      <div class="setting-group">
        <label data-i18n="dividend_label"></label>
        <div class="range-display" id="dividendDisplay"></div>
        <div class="range-wrap">
          <input type="range" id="dividendRange" min="10" max="100000" value="999" step="100"
            oninput="updateRangeDisplay('dividendDisplay', 'dividend_display', +this.value)">
        </div>
      </div>
    </div>
    <button class="apply-btn" onclick="applySettings()" data-i18n="apply_btn"></button>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-section" id="progressSection" style="display:none">
    <div class="progress-header">
      <span data-i18n="progress_label"></span>
      <span class="progress-counter" id="progressCounter">0 / 10</span>
    </div>
    <div class="progress-bar-track" id="progressBar"></div>
    <div class="progress-legend">
      <span><span class="legend-dot" style="background:var(--correct)"></span><span data-i18n="progress_correct"></span>: <span id="correctCount">0</span></span>
      <span><span class="legend-dot" style="background:var(--wrong)"></span><span data-i18n="progress_wrong"></span>: <span id="wrongCount">0</span></span>
    </div>
  </div>

  <!-- EXAMPLE CARD -->
  <div id="exampleArea">
    <div class="empty-state">
      <div class="emoji">🧮</div>
      <p data-i18n="empty_state_text"></p>
    </div>
  </div>

  <!-- NAV BUTTONS -->
  <div class="nav-buttons" id="navButtons" style="display:none">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled data-i18n="nav_prev"></button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)" data-i18n="nav_next"></button>
  </div>
</div>

<script>
  let mode = 'noRemainder';
  let examples = [];
  let currentIndex = 0;
  let results = [];
  let attempts = [];

  function updateRangeDisplay(elId, key, value) {
    document.getElementById(elId).textContent = t(key, { value: (+value).toLocaleString() });
  }

  document.addEventListener('i18n:ready', () => {
    updateRangeDisplay('divisorDisplay', 'divisor_display', document.getElementById('divisorRange').value);
    updateRangeDisplay('dividendDisplay', 'dividend_display', document.getElementById('dividendRange').value);
  });

  function setMode(m) {
    mode = m;
    document.getElementById('modeNoRemainder').classList.toggle('active', m === 'noRemainder');
    document.getElementById('modeRemainder').classList.toggle('active', m === 'remainder');
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function generateExamples() {
    const maxDivisor = parseInt(document.getElementById('divisorRange').value);
    const maxDividend = parseInt(document.getElementById('dividendRange').value);
    const arr = [];

    for (let i = 0; i < 10; i++) {
      let dividend, divisor, quotient, remainder;
      divisor = randInt(2, maxDivisor);

      if (mode === 'noRemainder') {
        // Generate quotient, compute exact dividend
        const maxQ = Math.floor(maxDividend / divisor);
        quotient = randInt(Math.max(2, Math.floor(10 / divisor)), Math.max(3, maxQ));
        dividend = divisor * quotient;
        remainder = 0;
      } else {
        // With remainder: dividend not divisible by divisor
        let tries = 0;
        do {
          dividend = randInt(10, maxDividend);
          tries++;
        } while (dividend % divisor === 0 && tries < 50);
        quotient = Math.floor(dividend / divisor);
        remainder = dividend % divisor;
      }

      arr.push({ dividend, divisor, quotient, remainder });
    }
    return arr;
  }

  function applySettings() {
    examples = generateExamples();
    results = new Array(10).fill(null);
    attempts = new Array(10).fill(0);
    currentIndex = 0;
    document.getElementById('progressSection').style.display = 'block';
    document.getElementById('navButtons').style.display = 'flex';
    renderProgress();
    renderCard();
  }

  function renderProgress() {
    const track = document.getElementById('progressBar');
    track.innerHTML = '';
    let correct = 0, wrong = 0;
    results.forEach((r, i) => {
      const seg = document.createElement('div');
      seg.className = 'progress-segment';
      if (r === 'correct') { seg.classList.add('correct'); correct++; }
      else if (r === 'wrong') { seg.classList.add('wrong'); wrong++; }
      track.appendChild(seg);
    });
    const answered = results.filter(r => r !== null).length;
    document.getElementById('progressCounter').textContent = `${answered} / 10`;
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = wrong;
  }

  function renderCard() {
    const ex = examples[currentIndex];
    const result = results[currentIndex];
    const att = attempts[currentIndex]; // wrong attempts so far
    const MAX_ATTEMPTS = 5;
    const finallyRevealed = result === 'wrong'; // locked after 5th wrong

    const locked = result === 'correct' || result === 'wrong';
    const disabled = locked ? 'disabled' : '';

    // Input classes
    const quotClass = result === 'correct' ? 'input-correct' : result === 'wrong' ? 'input-wrong' : '';

    // Badge
    let badge = '';
    if (result === 'correct') badge = `<div class="card-badge correct-badge">✅</div>`;
    else if (result === 'wrong') badge = `<div class="card-badge wrong-badge">❌</div>`;

    // Feedback message
    let feedbackText = '';
    let feedbackClass = '';
    if (result === 'correct') {
      feedbackText = t('feedback_correct');
      feedbackClass = 'correct';
    } else if (result === 'wrong') {
      feedbackText = mode === 'remainder'
        ? t('feedback_wrong_reveal_remainder', { quotient: ex.quotient, remainder: ex.remainder })
        : t('feedback_wrong_reveal', { quotient: ex.quotient });
      feedbackClass = 'wrong';
    } else if (att > 0) {
      const left = MAX_ATTEMPTS - att;
      feedbackText = left > 0 ? t('feedback_attempts_left', { left }) : '';
      feedbackClass = 'wrong';
    }

    // Input values: show correct answer only when finally revealed
    const quotVal = result !== null ? ex.quotient : '';
    const remVal  = result !== null ? ex.remainder : '';

    let inputsHTML = '';
    if (mode === 'remainder') {
      inputsHTML = `
        <div class="input-group">
          <span class="input-label">${t('input_label_quotient')}</span>
          <input type="number" class="answer-input ${quotClass}" id="inputQuot"
            placeholder="?" value="${quotVal}" ${disabled} min="0">
        </div>
        <div style="font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:var(--muted);align-self:flex-end;padding-bottom:10px">${t('remainder_separator')}</div>
        <div class="input-group">
          <span class="input-label">${t('input_label_remainder')}</span>
          <input type="number" class="answer-input ${quotClass}" id="inputRem"
            placeholder="?" value="${remVal}" ${disabled} min="0">
        </div>`;
    } else {
      inputsHTML = `
        <div class="input-group">
          <span class="input-label">${t('input_label_quotient')}</span>
          <input type="number" class="answer-input ${quotClass}" id="inputQuot"
            placeholder="?" value="${quotVal}" ${disabled} min="0">
        </div>`;
    }

    // Attempt dots (show only while unsolved)
    let dotsHTML = '';
    if (!locked) {
      dotsHTML = '<div class="attempt-dots">';
      for (let i = 0; i < MAX_ATTEMPTS; i++) {
        dotsHTML += `<span class="attempt-dot ${i < att ? 'used' : ''}"></span>`;
      }
      dotsHTML += '</div>';
    }

    const area = document.getElementById('exampleArea');
    area.innerHTML = `
      <div class="example-card" id="exampleCard">
        ${badge}
        <div class="example-num">${t('example_counter', { current: currentIndex + 1, total: 10 })}</div>

        <div class="division-visual">
          <div class="division-labeled">
            <div class="dl-item">
              <div class="dl-number dividend-num">${ex.dividend}</div>
              <div class="dl-label">${t('division_label_dividend')}</div>
            </div>
            <div class="div-sign">÷</div>
            <div class="dl-item">
              <div class="dl-number divisor-num">${ex.divisor}</div>
              <div class="dl-label">${t('division_label_divisor')}</div>
            </div>
            <div class="div-sign">=</div>
            <div class="dl-item">
              <div class="dl-number answer-num">?</div>
              <div class="dl-label">${t('division_label_quotient')}</div>
            </div>
          </div>
        </div>

        <div class="input-area">${inputsHTML}</div>
        ${dotsHTML}
        <button class="check-btn" id="checkBtn" onclick="checkAnswer()" ${disabled}>
          ${t('check_btn')}
        </button>
        <div class="feedback ${feedbackClass}" id="feedback">${feedbackText}</div>
      </div>`;

    if (!locked) {
      const inputs = document.querySelectorAll('.answer-input');
      inputs.forEach(inp => {
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
      });
      if (inputs.length > 0) inputs[0].focus();
    }

    updateNavBtns();
  }

  function checkAnswer() {
    if (results[currentIndex] !== null) return;
    const ex = examples[currentIndex];
    const MAX_ATTEMPTS = 5;

    const quotInput = document.getElementById('inputQuot');
    const quot = parseInt(quotInput.value);

    let correct;
    if (mode === 'remainder') {
      const remInput = document.getElementById('inputRem');
      const rem = parseInt(remInput.value);
      correct = quot === ex.quotient && rem === ex.remainder;
    } else {
      correct = quot === ex.quotient;
    }

    const card = document.getElementById('exampleCard');

    if (correct) {
      results[currentIndex] = 'correct';
      renderProgress();
      card.classList.add('glow-correct');
      launchConfetti();
      showEmoji('🎉');
      setTimeout(() => renderCard(), 700);
    } else {
      attempts[currentIndex]++;
      const att = attempts[currentIndex];
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 450);

      if (att >= MAX_ATTEMPTS) {
        // 5th wrong — lock and reveal
        results[currentIndex] = 'wrong';
        renderProgress();
        showEmoji('😢');
        setTimeout(() => renderCard(), 700);
      } else {
        // Show feedback inline without re-rendering the whole card
        showEmoji('😟');
        const left = MAX_ATTEMPTS - att;
        const fb = document.getElementById('feedback');
        fb.textContent = t('feedback_attempts_left', { left });
        fb.className = 'feedback wrong';
        // update dots
        const dots = document.querySelectorAll('.attempt-dot');
        dots.forEach((d, i) => { if (i < att) d.classList.add('used'); });
        // clear inputs for retry
        quotInput.value = '';
        quotInput.focus();
        if (mode === 'remainder') {
          const remInput = document.getElementById('inputRem');
          if (remInput) remInput.value = '';
        }
      }
    }
  }

  function navigate(dir) {
    const next = currentIndex + dir;
    if (next < 0 || next >= 10) return;
    currentIndex = next;
    renderCard();
  }

  function updateNavBtns() {
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === 9;
  }

  
  const CONFETTI_COLORS = ['#f4845f','#6bbf94','#74b3e8','#f9d56e','#c49de8','#f47c7c'];

  function launchConfetti() {
    const container = document.getElementById('confettiContainer');
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = '-20px';
      piece.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      piece.style.width = (8 + Math.random() * 8) + 'px';
      piece.style.height = (8 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      piece.style.animationDelay = (Math.random() * 0.5) + 's';
      container.appendChild(piece);
      piece.addEventListener('animationend', () => piece.remove());
    }
  }

  function showEmoji(emoji) {
    const el = document.createElement('div');
    el.className = 'emoji-burst';
    el.textContent = emoji;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
</script>
</body>
</html>
