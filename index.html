<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<script>const PAGE_KEY = 'index';</script>
<script src="i18n/index.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
  <style>
  body {
    padding: 40px 16px 64px;
    background-image:
      radial-gradient(circle at 10% 10%, #fde6da55 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #d4f0e355 0%, transparent 40%),
      radial-gradient(circle at 60% 20%, #d8edfc44 0%, transparent 30%),
      radial-gradient(circle at 20% 80%, #eedeff33 0%, transparent 30%);
  }

  .deco { opacity: 0.15; }

  .container { max-width: 760px; }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 48px; animation: fadeDown 0.6s ease both; }

  .header-badge {
    display: inline-block;
    background: var(--primary-light);
    color: var(--primary);
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 5px 14px;
    border-radius: 99px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 2.6rem;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 12px;
  }
  h1 span { color: var(--primary); }

  .subtitle { font-weight: 600; max-width: 420px; margin: 0 auto; line-height: 1.6; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1.5px;
    background: var(--border);
    border-radius: 99px;
  }

  /* ── TRAINER GRID ── */
  .trainers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 40px;
  }
  @media (max-width: 540px) {
    .trainers-grid { grid-template-columns: 1fr; }
    h1 { font-size: 2rem; }
  }

  /* ── TRAINER CARD ── */
  .trainer-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  .trainer-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .trainer-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

  .card-multiply::before  { background: var(--primary); }
  .card-divide::before    { background: var(--blue); }
  .card-subtract::before  { background: var(--accent); }
  .card-fraction::before  { background: var(--purple); }

  .card-multiply:hover  { border-color: var(--primary); }
  .card-divide:hover    { border-color: var(--blue); }
  .card-subtract:hover  { border-color: var(--accent); }
  .card-fraction:hover  { border-color: var(--purple); }

  .trainer-card:nth-child(1) { animation-delay: 0.1s; }
  .trainer-card:nth-child(2) { animation-delay: 0.2s; }
  .trainer-card:nth-child(3) { animation-delay: 0.3s; }
  .trainer-card:nth-child(4) { animation-delay: 0.4s; }
  .trainer-card:nth-child(5) { animation-delay: 0.5s; }

  .card-icon  { font-size: 2.2rem; line-height: 1; }
  .card-body  { flex: 1; }
  .card-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .card-desc { font-size: 0.82rem; font-weight: 600; color: var(--muted); line-height: 1.5; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .card-tag {
    font-size: 0.72rem;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .tag-multiply  { background: var(--primary-light); color: var(--primary); }
  .tag-divide    { background: var(--blue-light);    color: #4a8ec2; }
  .tag-subtract  { background: var(--accent-light);  color: #3a9a6a; }
  .tag-fraction  { background: var(--purple-light);  color: #8a62c8; }

  .card-version { font-size: 0.7rem; font-weight: 700; color: var(--muted); opacity: 0.7; }
  .card-arrow {
    position: absolute;
    bottom: 22px; right: 22px;
    font-size: 1rem;
    color: var(--muted);
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.2s, transform 0.2s;
  }
  .trainer-card:hover .card-arrow { opacity: 1; transform: translateX(0); }

  /* ── FOOTER ── */
  .footer-note {
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 600;
    padding-top: 8px;
    animation: fadeUp 0.5s ease 0.6s both;
  }
  .footer-note a { color: var(--primary); text-decoration: none; font-weight: 700; }
  .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="deco">⭐</div>
<div class="deco">🌟</div>
<div class="deco">🎒</div>
<div class="deco">🍎</div>
<div class="deco">✏️</div>
<div class="deco">🐣</div>

<div class="container">

  <header class="header">
    <div class="header-badge" data-i18n="header_badge"></div>
    <h1><span data-i18n="h1_line1"></span><br><span data-i18n="h1_line2"></span></h1>
    <p class="subtitle" data-i18n="subtitle"></p>
  </header>

  <div class="section-label" data-i18n="section_multiply"></div>
  <div class="trainers-grid">

    <a class="trainer-card card-multiply" href="multiplication-trainer-main.html">
      <div class="card-icon">✖️</div>
      <div class="card-body">
        <div class="card-title" data-i18n="card_multiply_title"></div>
        <div class="card-desc" data-i18n="card_multiply_desc"></div>
      </div>
      <div class="card-footer">
        <span class="card-tag tag-multiply" data-i18n="tag_multiply"></span>
      </div>
      <span class="card-arrow">→</span>
    </a>

  </div>

  <div class="section-label" data-i18n="section_divide"></div>
  <div class="trainers-grid">

    <a class="trainer-card card-divide" href="division-trainer-main.html">
      <div class="card-icon">➗</div>
      <div class="card-body">
        <div class="card-title" data-i18n="card_divide_main_title"></div>
        <div class="card-desc" data-i18n="card_divide_main_desc"></div>
      </div>
      <div class="card-footer">
        <span class="card-tag tag-divide" data-i18n="tag_divide"></span>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="trainer-card card-divide" href="division-trainer_1.html">
      <div class="card-icon">➗</div>
      <div class="card-body">
        <div class="card-title" data-i18n="card_divide_col_title"></div>
        <div class="card-desc" data-i18n="card_divide_col_desc"></div>
      </div>
      <div class="card-footer">
        <span class="card-tag tag-divide" data-i18n="tag_divide"></span>
      </div>
      <span class="card-arrow">→</span>
    </a>

  </div>

  <div class="section-label" data-i18n="section_subtract"></div>
  <div class="trainers-grid">

    <a class="trainer-card card-subtract" href="subtraction-trainer_1.html">
      <div class="card-icon">➖</div>
      <div class="card-body">
        <div class="card-title" data-i18n="card_subtract_title"></div>
        <div class="card-desc" data-i18n="card_subtract_desc"></div>
      </div>
      <div class="card-footer">
        <span class="card-tag tag-subtract" data-i18n="tag_subtract"></span>
      </div>
      <span class="card-arrow">→</span>
    </a>

  </div>

  <div class="section-label" data-i18n="section_fraction"></div>
  <div class="trainers-grid">

    <a class="trainer-card card-fraction" href="fraction-comparison.html">
      <div class="card-icon">🥧</div>
      <div class="card-body">
        <div class="card-title" data-i18n="card_fraction_compare_title"></div>
        <div class="card-desc" data-i18n="card_fraction_compare_desc"></div>
      </div>
      <div class="card-footer">
        <span class="card-tag tag-fraction" data-i18n="tag_fraction"></span>
      </div>
      <span class="card-arrow">→</span>
    </a>

  </div>

  <p class="footer-note" data-i18n="footer_note"></p>

</div>
</body>
</html>
