<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<script>const PAGE_KEY = 'multiplication';</script>
<script src="i18n/index.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ee;
    --card: #fff9f2;
    --primary: #f4845f;
    --primary-light: #fdddd3;
    --accent: #6bbf94;
    --accent-light: #d4f0e3;
    --blue: #74b3e8;
    --blue-light: #d8edfc;
    --yellow: #f9d56e;
    --yellow-light: #fef6d6;
    --purple: #c49de8;
    --purple-light: #eedeff;
    --text: #3d3642;
    --muted: #a09aab;
    --border: #ecdfd4;
    --correct: #6bbf94;
    --wrong: #f47c7c;
    --radius: 20px;
    --radius-sm: 12px;
    --shadow: 0 4px 24px rgba(100,60,30,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
    background-image:
      radial-gradient(circle at 10% 10%, #fde6da55 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #d4f0e355 0%, transparent 40%),
      radial-gradient(circle at 60% 20%, #d8edfc44 0%, transparent 30%);
  }

  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    color: var(--primary);
    text-align: center;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 28px;
  }

  
  .deco {
    position: fixed;
    pointer-events: none;
    user-select: none;
    font-size: 2.4rem;
    opacity: 0.18;
    animation: float 6s ease-in-out infinite;
  }
  .deco:nth-child(1) { top: 5%; left: 3%; animation-delay: 0s; }
  .deco:nth-child(2) { top: 12%; right: 5%; animation-delay: 1s; font-size: 2rem; }
  .deco:nth-child(3) { bottom: 8%; left: 6%; animation-delay: 2s; font-size: 1.8rem; }
  .deco:nth-child(4) { bottom: 15%; right: 4%; animation-delay: 3s; }
  .deco:nth-child(5) { top: 50%; left: 1%; animation-delay: 1.5s; font-size: 1.6rem; }
  @keyframes float {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }

  
  .container {
    max-width: 700px;
    margin: 0 auto;
  }

  
  .settings-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 28px;
    margin-bottom: 28px;
  }

  .settings-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Table selector */
  .table-label {
    display: block;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .table-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .table-btn {
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
    min-width: 52px;
    text-align: center;
  }

  .table-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
  }

  .table-btn.active {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
  }

  .table-btn.mix-btn {
    border-color: var(--purple);
    background: white;
    color: var(--purple);
  }

  .table-btn.mix-btn.active {
    background: var(--purple-light);
    border-color: var(--purple);
    color: #8a5fc8;
  }

  /* Apply button */
  .apply-btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--primary) 0%, #e8683e 100%);
    color: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(244,132,95,0.35);
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }

  .apply-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(244,132,95,0.45);
  }

  .apply-btn:active { transform: translateY(0); }

  
  .progress-section {
    margin-bottom: 20px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
  }

  .progress-counter {
    font-family: 'Baloo 2', cursive;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }

  .progress-bar-track {
    height: 14px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    display: flex;
    gap: 2px;
  }

  .progress-segment {
    flex: 1;
    background: #ecdfd4;
    border-radius: 99px;
    transition: background 0.4s ease;
  }

  .progress-segment.correct { background: var(--correct); }
  .progress-segment.wrong { background: var(--wrong); }

  .progress-legend {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
  }

  .legend-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 4px;
  }

  
  .example-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px 28px 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.3s;
  }

  .example-card.shake {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .example-card.glow-correct {
    box-shadow: 0 0 0 3px var(--correct), var(--shadow);
  }

  .example-card.glow-wrong {
    box-shadow: 0 0 0 3px var(--wrong), var(--shadow);
  }

  .example-num {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }

  
  .mult-visual {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .mult-num {
    font-family: 'Baloo 2', cursive;
    font-size: 3.2rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .mult-num.factor-b {
    color: var(--primary);
  }

  .mult-sign {
    font-family: 'Baloo 2', cursive;
    font-size: 2.8rem;
    font-weight: 800;
    color: var(--muted);
    line-height: 1;
  }

  .equals-sign {
    font-family: 'Baloo 2', cursive;
    font-size: 2.8rem;
    font-weight: 800;
    color: var(--muted);
    line-height: 1;
  }

  
  .input-area {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .input-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .answer-input {
    width: 120px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 2.5px solid var(--border);
    background: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  .answer-input::-webkit-inner-spin-button,
  .answer-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .answer-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-light);
  }

  .answer-input.input-correct {
    border-color: var(--correct);
    background: var(--accent-light);
  }

  .answer-input.input-wrong {
    border-color: var(--wrong);
    background: #fde8e8;
  }

  
  .check-btn {
    display: block;
    width: 100%;
    max-width: 280px;
    margin: 0 auto;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, #4aaa7a 100%);
    color: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(107,191,148,0.35);
    transition: all 0.2s ease;
  }

  .check-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(107,191,148,0.45);
  }

  .check-btn:active { transform: translateY(0); }
  .check-btn:disabled {
    opacity: 0.6;
    cursor: default;
    transform: none;
  }

  
  .feedback {
    text-align: center;
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    font-weight: 800;
    min-height: 48px;
    margin-top: 16px;
    transition: all 0.3s ease;
  }

  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }

  
  .nav-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .nav-btn {
    flex: 1;
    max-width: 180px;
    padding: 13px 20px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--blue);
    background: var(--blue-light);
    color: var(--blue);
    transform: translateY(-2px);
  }

  .nav-btn:disabled {
    opacity: 0.4;
    cursor: default;
    transform: none;
  }

  
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1000;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  
  .emoji-burst {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 5rem;
    pointer-events: none;
    z-index: 1001;
    animation: emojiBurst 1.2s ease forwards;
  }

  @keyframes emojiBurst {
    0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -60%) scale(0.8); opacity: 0; }
  }

  
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 1rem; font-weight: 600; }

  
  .card-badge {
    position: absolute;
    top: 20px; right: 20px;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
  }

  .card-badge.correct-badge { background: var(--accent-light); }
  .card-badge.wrong-badge { background: #fde8e8; }

  
  .attempts-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .attempt-pips {
    display: flex;
    gap: 6px;
  }

  .attempt-pip {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    transition: all 0.25s ease;
  }

  .attempt-pip.used {
    background: var(--wrong);
    border-color: var(--wrong);
  }

  .attempt-pip.correct {
    background: var(--correct);
    border-color: var(--correct);
  }

  
  .basket-section {
    background: var(--yellow-light);
    border: 2px solid var(--yellow);
    border-radius: var(--radius);
    padding: 16px 16px 20px;
    margin-bottom: 24px;
    position: relative;
  }

  .basket-label {
    font-size: 0.75rem;
    font-weight: 800;
    color: #b8860b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    text-align: center;
  }

  .basket-groups {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }

  .basket-group {
    background: white;
    border: 1.5px solid #f9d56e;
    border-radius: 14px;
    padding: 8px 10px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    justify-content: center;
    align-content: flex-start;
    min-width: 64px;
    max-width: 160px;
    min-height: 56px;
    box-shadow: 0 2px 8px rgba(200,160,0,0.10);
    position: relative;
    transition: background 0.15s, border-color 0.15s;
  }

  .basket-group.drag-over {
    background: #fef6d6;
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary-light);
  }

  .basket-group-num {
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--yellow);
    border-radius: 99px;
    font-size: 0.65rem;
    font-weight: 800;
    color: #7a5900;
    padding: 1px 7px;
    white-space: nowrap;
  }

  /* Counter badge at bottom of basket */
  .basket-counter {
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Baloo 2', cursive;
    font-size: 0.7rem;
    font-weight: 800;
    color: #b28a00;
    background: var(--yellow-light);
    border: 1px solid #f9d56e;
    border-radius: 99px;
    padding: 0px 7px;
    white-space: nowrap;
    min-width: 24px;
    text-align: center;
  }

  
  .chick-source {
    text-align: center;
    margin-bottom: 14px;
  }

  .chick-source-label {
    font-size: 0.75rem;
    font-weight: 800;
    color: #b8860b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .chick-draggable {
    font-size: 2.2rem;
    display: inline-block;
    cursor: grab;
    user-select: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    transition: transform 0.15s;
  }

  .chick-draggable:hover {
    transform: scale(1.15);
  }

  .chick-draggable:active {
    cursor: grabbing;
  }

  .chick-draggable.dragging {
    opacity: 0.4;
  }

  /* Chicks placed inside baskets */
  .chick-in-basket {
    font-size: 1.3rem;
    line-height: 1;
    display: inline-block;
    cursor: pointer;
    user-select: none;
    animation: chickPop 0.25s ease both;
    transition: transform 0.1s, filter 0.1s;
  }

  .chick-in-basket:hover {
    transform: scale(1.2);
    filter: brightness(0.85);
  }

  /* Static chicks (after answer revealed) */
  .chick {
    font-size: 1.3rem;
    line-height: 1;
    display: inline-block;
    animation: chickPop 0.35s ease both;
  }

  @keyframes chickPop {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }

  .chick-placeholder {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem;
    font-weight: 800;
    color: #b28a00;
    line-height: 1;
    padding: 4px 6px;
  }

  /* Max-reached hint */
  .chick-max-hint {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--wrong);
    text-align: center;
    margin-top: 4px;
    min-height: 18px;
    transition: opacity 0.3s;
  }

  @media (max-width: 480px) {
    .mult-num { font-size: 2.4rem; }
    .mult-sign, .equals-sign { font-size: 2rem; }
    .answer-input { width: 100px; font-size: 1.5rem; }
    .chick { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<!-- Decorative floating elements -->
<div class="deco">⭐</div>
<div class="deco">🌟</div>
<div class="deco">🎒</div>
<div class="deco">🍎</div>
<div class="deco">✏️</div>

<div class="confetti-container" id="confettiContainer"></div>

<div class="container">
  <h1 data-i18n="h1"></h1>
  <p class="subtitle" data-i18n="subtitle"></p>

  <div class="settings-card">
    <div class="settings-title" data-i18n="settings_title"></div>
    <span class="table-label" data-i18n="table_label"></span>
    <div class="table-buttons" id="tableButtons">
      <button class="table-btn mix-btn active" data-val="mix" onclick="selectTable(this)" data-i18n="table_mix"></button>
      <button class="table-btn" data-val="2"  onclick="selectTable(this)" data-i18n="table_btn_2"></button>
      <button class="table-btn" data-val="3"  onclick="selectTable(this)" data-i18n="table_btn_3"></button>
      <button class="table-btn" data-val="4"  onclick="selectTable(this)" data-i18n="table_btn_4"></button>
      <button class="table-btn" data-val="5"  onclick="selectTable(this)" data-i18n="table_btn_5"></button>
      <button class="table-btn" data-val="6"  onclick="selectTable(this)" data-i18n="table_btn_6"></button>
      <button class="table-btn" data-val="7"  onclick="selectTable(this)" data-i18n="table_btn_7"></button>
      <button class="table-btn" data-val="8"  onclick="selectTable(this)" data-i18n="table_btn_8"></button>
      <button class="table-btn" data-val="9"  onclick="selectTable(this)" data-i18n="table_btn_9"></button>
      <button class="table-btn" data-val="10" onclick="selectTable(this)" data-i18n="table_btn_10"></button>
    </div>
    <button class="apply-btn" onclick="applySettings()" data-i18n="apply_btn"></button>
  </div>

  <div class="progress-section" id="progressSection" style="display:none">
    <div class="progress-header">
      <span data-i18n="progress_label"></span>
      <span class="progress-counter" id="progressCounter">0 / 20</span>
    </div>
    <div class="progress-bar-track" id="progressBar"></div>
    <div class="progress-legend">
      <span><span class="legend-dot" style="background:var(--correct)"></span><span data-i18n="progress_correct"></span>: <span id="correctCount">0</span></span>
      <span><span class="legend-dot" style="background:var(--wrong)"></span><span data-i18n="progress_wrong"></span>: <span id="wrongCount">0</span></span>
    </div>
  </div>

  <div id="exampleArea">
    <div class="empty-state">
      <div class="emoji">🌟</div>
      <p data-i18n="empty_state_text"></p>
    </div>
  </div>

  <div class="nav-buttons" id="navButtons" style="display:none">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled data-i18n="nav_prev"></button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)" data-i18n="nav_next"></button>
  </div>
</div>

<script>
  const TOTAL = 20;
  const MAX_ATTEMPTS = 5;
  let selectedTable = 'mix';
  let examples = [];
  let currentIndex = 0;
  let results = [];    // null | 'correct' | 'wrong'
  let attempts = [];   // number of wrong attempts per example
  let revealed = [];   // whether answer was revealed (wrong path)

  function selectTable(btn) {
    document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTable = btn.dataset.val;
  }

  function generateExamples() {
    const pool = [];
    if (selectedTable === 'mix') {
      // 90 unique pairs (2–10) × (1–10) — enough for 20
      for (let b = 2; b <= 10; b++)
        for (let a = 1; a <= 10; a++) pool.push({ table: b, other: a });
    } else {
      const b = parseInt(selectedTable);
      // 10 pairs × 1–10; duplicate the pool so we always have ≥ 20 items
      for (let pass = 0; pass < 2; pass++)
        for (let a = 1; a <= 10; a++) pool.push({ table: b, other: a });
    }
    // Fisher-Yates shuffle
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const result = [];
    for (const item of pool) {
      if (result.length >= TOTAL) break;
      result.push({ table: item.table, other: item.other, ans: item.table * item.other });
    }
    return result;
  }

  function applySettings() {
    examples = generateExamples();
    results  = new Array(examples.length).fill(null);
    attempts = new Array(examples.length).fill(0);
    revealed = new Array(examples.length).fill(false);
    currentIndex = 0;
    document.getElementById('progressSection').style.display = 'block';
    document.getElementById('navButtons').style.display = 'flex';
    renderProgress();
    renderCard();
  }

  function renderProgress() {
    const track = document.getElementById('progressBar');
    track.innerHTML = '';
    let correct = 0, wrong = 0;
    results.forEach(r => {
      const seg = document.createElement('div');
      seg.className = 'progress-segment';
      if (r === 'correct') { seg.classList.add('correct'); correct++; }
      else if (r === 'wrong') { seg.classList.add('wrong'); wrong++; }
      track.appendChild(seg);
    });
    const answered = results.filter(r => r !== null).length;
    document.getElementById('progressCounter').textContent = `${answered} / ${examples.length}`;
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = wrong;
  }

  // Russian grammar: numeral agreement
  function wordForm(n, one, few, many) {
    const mod10 = n % 10, mod100 = n % 100;
    if (mod100 >= 11 && mod100 <= 19) return many;
    if (mod10 === 1) return one;
    if (mod10 >= 2 && mod10 <= 4) return few;
    return many;
  }

  // After answer: static chick display
  function buildStaticBaskets(table, other) {
    const groups   = other;
    const perGroup = table;
    const bKey = groups === 1 ? 'basket_group_word_one' : groups < 5 ? 'basket_group_word_few' : 'basket_group_word_many';
    const cKey = perGroup === 1 ? 'basket_chick_word_one' : perGroup < 5 ? 'basket_chick_word_few' : 'basket_chick_word_many';

    let html = `<div class="basket-section">
      <div class="basket-label">${t('basket_label', { groups, bWord: t(bKey), perGroup, cWord: t(cKey) })}</div>
      <div class="basket-groups">`;

    for (let g = 0; g < groups; g++) {
      html += `<div class="basket-group"><span class="basket-group-num">${g + 1}</span>`;
      for (let c = 0; c < perGroup; c++) {
        const delay = (g * perGroup + c) * 40;
        html += `<span class="chick" style="animation-delay:${delay}ms">🐣</span>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
    return html;
  }

  // Before answer: drag & drop interface
  function buildDragZone(table, other) {
    const groups  = other;
    const maxTotal = table * 10;
    const bKey = groups === 1 ? 'basket_group_word_one' : groups < 5 ? 'basket_group_word_few' : 'basket_group_word_many';

    let basketsHTML = '';
    for (let g = 0; g < groups; g++) {
      basketsHTML += `<div class="basket-group drop-zone" data-basket="${g}">
        <span class="basket-group-num">${g + 1}</span>
        <span class="basket-counter" id="counter-${g}">0</span>
      </div>`;
    }

    return `<div class="basket-section" id="dragBasketSection">
      <div class="basket-label">${t('drag_label', { count: groups, bWord: t(bKey) })}</div>
      <div class="chick-source">
        <div class="chick-source-label">${t('drag_source_label')}</div>
        <span class="chick-draggable" id="chickSource" draggable="true">🐣</span>
        <div class="chick-max-hint" id="chickMaxHint"></div>
      </div>
      <div class="basket-groups" id="dragBasketGroups">${basketsHTML}</div>
    </div>`;
  }

  function buildAttemptPips(idx, resultVal) {
    const used = attempts[idx];
    let pipsHtml = '';
    for (let i = 0; i < MAX_ATTEMPTS; i++) {
      let cls = 'attempt-pip';
      if (resultVal === 'correct' && i === 0) { cls += ' correct'; }
      else if (i < used) { cls += ' used'; }
      pipsHtml += `<div class="${cls}"></div>`;
    }
    return `<div class="attempts-row">
      ${t('attempts_label')}: <div class="attempt-pips">${pipsHtml}</div>
    </div>`;
  }

  function renderCard() {
    const ex     = examples[currentIndex];
    const result = results[currentIndex];
    const att    = attempts[currentIndex];
    const done   = result !== null;

    const disabled   = done ? 'disabled' : '';
    const inputClass = result === 'correct' ? 'input-correct' : (done ? 'input-wrong' : '');

    let badge = '';
    if (result === 'correct') badge = `<div class="card-badge correct-badge">✅</div>`;
    else if (result === 'wrong') badge = `<div class="card-badge wrong-badge">❌</div>`;

    let feedbackText = '', feedbackClass = '';
    if (result === 'correct') {
      const keys = ['feedback_correct_0', 'feedback_correct_1', 'feedback_correct_2'];
      feedbackText = t(keys[att % keys.length]);
      feedbackClass = 'correct';
    } else if (result === 'wrong') {
      feedbackText = t('feedback_wrong_reveal', { answer: ex.ans });
      feedbackClass = 'wrong';
    } else if (att > 0) {
      const left = MAX_ATTEMPTS - att;
      feedbackText = left > 0 ? t('feedback_attempts_left', { left }) : '';
      feedbackClass = 'wrong';
    }

    const basketHTML = done
      ? buildStaticBaskets(ex.table, ex.other)
      : buildDragZone(ex.table, ex.other);

    const inputValue = done ? ex.ans : '';
    const pipsHTML   = buildAttemptPips(currentIndex, result);

    const area = document.getElementById('exampleArea');
    area.innerHTML = `
      <div class="example-card" id="exampleCard">
        ${badge}
        <div class="example-num">${t('example_counter', { current: currentIndex + 1, total: examples.length })}</div>
        <div class="mult-visual">
          <div class="mult-num factor-b">${ex.table}</div>
          <div class="mult-sign">×</div>
          <div class="mult-num">${ex.other}</div>
          <div class="equals-sign">=</div>
        </div>
        ${basketHTML}
        ${pipsHTML}
        <div class="input-area">
          <div class="input-group">
            <span class="input-label">${t('input_label')}</span>
            <input type="number" class="answer-input ${inputClass}" id="inputAns"
              placeholder="?" value="${inputValue}" ${disabled} min="0" max="999">
          </div>
        </div>
        <button class="check-btn" id="checkBtn" onclick="checkAnswer()" ${disabled}>
          ${t('check_btn')}
        </button>
        <div class="feedback ${feedbackClass}" id="feedback">${feedbackText}</div>
      </div>`;

    if (!done) {
      const inp = document.getElementById('inputAns');
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
      inp.focus();
      initDragDrop(ex.table, ex.other);
    }

    updateNavBtns();
  }

  function initDragDrop(table, other) {
    const maxTotal   = table * 10;
    const source     = document.getElementById('chickSource');
    const hint       = document.getElementById('chickMaxHint');
    const groupsEl   = document.getElementById('dragBasketGroups');
    if (!source || !groupsEl) return;

    // Count all chicks currently in baskets
    function totalInBaskets() {
      return groupsEl.querySelectorAll('.chick-in-basket').length;
    }

    // Update counter badge for a specific basket
    function refreshCounter(basketEl) {
      const n = basketEl.querySelectorAll('.chick-in-basket').length;
      const counter = basketEl.querySelector('.basket-counter');
      if (counter) counter.textContent = n;
    }

    // Show / hide max-reached hint
    function refreshHint() {
      const reached = totalInBaskets() >= maxTotal;
      hint.textContent = reached ? t('drag_max_hint', { max: maxTotal }) : '';
    }

    // ── Source drag ──
    source.addEventListener('dragstart', e => {
      if (totalInBaskets() >= maxTotal) {
        e.preventDefault();
        refreshHint();
        return;
      }
      e.dataTransfer.setData('text/plain', 'new');
      e.dataTransfer.effectAllowed = 'copy';
      requestAnimationFrame(() => source.classList.add('dragging'));
    });

    source.addEventListener('dragend', () => {
      source.classList.remove('dragging');
      refreshHint();
    });

    // ── Drop zones ──
    groupsEl.querySelectorAll('.drop-zone').forEach(basket => {
      basket.addEventListener('dragover', e => {
        if (totalInBaskets() >= maxTotal) return; // no drop if full
        e.preventDefault();
        basket.classList.add('drag-over');
      });

      basket.addEventListener('dragleave', e => {
        if (!basket.contains(e.relatedTarget)) basket.classList.remove('drag-over');
      });

      basket.addEventListener('drop', e => {
        e.preventDefault();
        basket.classList.remove('drag-over');
        if (totalInBaskets() >= maxTotal) {
          refreshHint();
          return;
        }
        // Place a new chick clone into this basket
        const chick = document.createElement('span');
        chick.className = 'chick-in-basket';
        chick.textContent = '🐣';
        chick.title = t('chick_remove_hint');
        chick.addEventListener('dblclick', () => {
          chick.remove();
          refreshCounter(basket);
          refreshHint();
        });
        basket.appendChild(chick);
        refreshCounter(basket);
        refreshHint();
      });
    });
  }

  function checkAnswer() {
    const ex  = examples[currentIndex];
    const idx = currentIndex;
    if (results[idx] !== null) return;

    const inp = document.getElementById('inputAns');
    const val = parseInt(inp.value);
    if (isNaN(val) || inp.value === '') { inp.focus(); return; }

    const correct = val === ex.ans;

    if (correct) {
      results[idx] = 'correct';
      renderProgress();
      const card = document.getElementById('exampleCard');
      card.classList.add('glow-correct');
      launchConfetti();
      showEmoji('🎉');
      setTimeout(() => renderCard(), 700);
    } else {
      attempts[idx]++;
      const card = document.getElementById('exampleCard');
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 450);

      if (attempts[idx] >= MAX_ATTEMPTS) {
        // All attempts used — reveal answer, mark wrong
        results[idx]  = 'wrong';
        revealed[idx] = true;
        renderProgress();
        card.classList.add('glow-wrong');
        showEmoji('😢');
        setTimeout(() => renderCard(), 700);
      } else {
        // Still has attempts — update pips + feedback inline without full re-render
        const left = MAX_ATTEMPTS - attempts[idx];
        const fb = document.getElementById('feedback');
        if (fb) { fb.className = 'feedback wrong'; fb.textContent = t('feedback_attempts_left', { left }); }
        // Refresh pips
        const pipsContainer = document.querySelector('.attempts-row');
        if (pipsContainer) pipsContainer.outerHTML = buildAttemptPips(idx, null);
        inp.value = '';
        inp.classList.add('input-wrong');
        setTimeout(() => { inp.classList.remove('input-wrong'); inp.focus(); }, 500);
      }
    }
  }

  function navigate(dir) {
    const next = currentIndex + dir;
    if (next < 0 || next >= examples.length) return;
    currentIndex = next;
    renderCard();
  }

  function updateNavBtns() {
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === examples.length - 1;
  }

  
  const CONFETTI_COLORS = ['#f4845f','#6bbf94','#74b3e8','#f9d56e','#c49de8','#f47c7c'];

  function launchConfetti() {
    const container = document.getElementById('confettiContainer');
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = '-20px';
      piece.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      piece.style.width = (8 + Math.random() * 8) + 'px';
      piece.style.height = (8 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      piece.style.animationDelay = (Math.random() * 0.5) + 's';
      container.appendChild(piece);
      piece.addEventListener('animationend', () => piece.remove());
    }
  }

  function showEmoji(emoji) {
    const el = document.createElement('div');
    el.className = 'emoji-burst';
    el.textContent = emoji;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
</script>
</body>
</html>
